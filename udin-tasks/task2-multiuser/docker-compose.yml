services:
  mysql:
    image: mysql:8
    container_name: udin-sokoban-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sokoban
    ports:
      - "3306:3306"
    volumes:
      - sokoban_mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: udin-sokoban-phpmyadmin
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8080:80"

volumes:
  sokoban_mysql_data:
